# NewPixie CRT post-processing. Changes take effect when mdplayer restarts.
# Set enabled=false for the original, nearest-neighbour output.
enabled = true
shader_dir = filters/newpixie

# Frame persistence/afterglow. Higher values linger longer (0.0 to 0.99).
persistence = 0.6

# Horizontal and vertical light bleed radius, in source pixels (0.0 to 5.0).
blur_x = 4.0
blur_y = 4.0

# NewPixie display controls.
curvature = 1.0
interference = true
# Overall horizontal displacement. 1.0 matches upstream NewPixie.
interference_strength = 0.35
# Animation rate; 0.0 freezes the interference pattern.
interference_speed = 1.0
# Vertical density of the broad interference bands.
interference_frequency = 1.0
# Fine per-scanline horizontal ripple. Upstream is 0.25.
interference_line_strength = 0.10
rolling_scanlines = true
vignette = 1.0
ghosting = 1.0
mask_strength = 0.23
brightness = 1.0
